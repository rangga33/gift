<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Special Gift 🎁</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0f172a;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .container {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 20px;
    }

    .active {
      display: flex;
    }

    .gift {
      font-size: 80px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .gift:hover {
      transform: scale(1.2);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .message {
      font-size: 22px;
      max-width: 500px;
    }

    .typing {
      border-right: 2px solid white;
      white-space: nowrap;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

<canvas id="confetti"></canvas>

<div id="page1" class="container active">
  <div class="gift" onclick="openGift()">🎁</div>
  <p>Open your gift, vanilla 😋✨</p>
</div>

<div id="page2" class="container">
  <div class="message typing" id="text"></div>
  <button onclick="nextPage()">Next →</button>
</div>

<div id="page3" class="container">
  <h1>🎉 CONGRATULATION 🐱</h1>
  <h1>🍌 ON PASSING ON YOUR PERIODDDDD YUHUUUUU! 🎉</h1>
  <p class="message">
    May our days be full of happiness, joy, laughter, and good things ✨<br><br>
    and i hope i can get to know you better 🍫😇<br><br>
    Dari seseorang yang berharap kamu selalu bahagia 💙❤️🤎
  </p>
</div>

<script>
  const message = "Hai Leraaaaa... 👀\n\nI want to say something hehe...\n\nThank youu for coming todayyy...😊\n\nThis my promise to my gerberas (Maybee hh) 💫";
  let i = 0;

  function openGift() {
    document.getElementById('page1').classList.remove('active');
    document.getElementById('page2').classList.add('active');
    startTyping();
    startConfetti();
  }

  function startTyping() {
    const textEl = document.getElementById('text');
    function type() {
      if (i < message.length) {
        textEl.innerHTML += message.charAt(i) === '\n' ? '<br>' : message.charAt(i);
        i++;
        setTimeout(type, 40);
      }
    }
    type();
  }

  function nextPage() {
    document.getElementById('page2').classList.remove('active');
    document.getElementById('page3').classList.add('active');
  }

  // FIXED sparkles (no syntax error)
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let particles = [];

  function startConfetti() {
    particles = []; // reset biar ga numpuk
    for (let i = 0; i < 40; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 1,
        speed: Math.random() * 0.5 + 0.2,
        alpha: Math.random() * 0.5 + 0.3
      });
    }
    animate();
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
      ctx.fill();
    });

    update();
    requestAnimationFrame(animate);
  }

  function update() {
    particles.forEach(p => {
      p.y -= p.speed;
      if (p.y < 0) {
        p.y = canvas.height;
        p.x = Math.random() * canvas.width;
      }
    });
  }
</script>

</body>
</html>
